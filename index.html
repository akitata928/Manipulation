<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 變革 Wiki｜現代操弄藍圖</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Noto+Serif+TC:wght@400;700;900&family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --wiki-bg: #0d1117;
            --wiki-surface: #161b22;
            --wiki-surface-2: #1c2128;
            --wiki-border: #30363d;
            --wiki-border-light: #21262d;
            --wiki-text: #e6edf3;
            --wiki-text-muted: #8b949e;
            --wiki-text-dim: #6e7681;
            --wiki-accent: #58a6ff;
            --wiki-accent-glow: rgba(88,166,255,0.15);
            --wiki-green: #3fb950;
            --wiki-amber: #d29922;
            --wiki-red: #f85149;
            --wiki-purple: #bc8cff;
            --wiki-cyan: #39d353;
            --sidebar-width: 260px;
            --font-mono: 'IBM Plex Mono', monospace;
            --font-serif: 'Noto Serif TC', serif;
            --font-sans: 'Space Grotesk', sans-serif;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font-sans);
            background-color: var(--wiki-bg);
            color: var(--wiki-text);
            display: flex;
            min-height: 100vh;
            font-size: 15px;
            line-height: 1.7;
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--wiki-bg); }
        ::-webkit-scrollbar-thumb { background: var(--wiki-border); border-radius: 3px; }

        /* ════════════════ SIDEBAR ════════════════ */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--wiki-surface);
            border-right: 1px solid var(--wiki-border);
            position: fixed;
            top: 0; left: 0;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .sidebar-header {
            padding: 20px 16px 14px;
            border-bottom: 1px solid var(--wiki-border);
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }

        .logo-icon {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, var(--wiki-accent), var(--wiki-purple));
            border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .logo-text {
            font-family: var(--font-mono);
            font-size: 0.75em;
            color: var(--wiki-text-muted);
            line-height: 1.3;
        }

        .logo-text strong {
            display: block;
            color: var(--wiki-text);
            font-size: 1.1em;
            letter-spacing: 0.05em;
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--wiki-bg);
            border: 1px solid var(--wiki-border);
            border-radius: 6px;
            padding: 7px 12px;
            cursor: text;
            transition: border-color 0.2s;
        }
        .search-box:hover { border-color: var(--wiki-accent); }
        .search-box span { color: var(--wiki-text-dim); font-size: 0.8em; font-family: var(--font-mono); }
        .search-box kbd {
            margin-left: auto;
            background: var(--wiki-surface-2);
            border: 1px solid var(--wiki-border);
            border-radius: 4px;
            padding: 1px 5px;
            font-size: 0.7em;
            color: var(--wiki-text-dim);
            font-family: var(--font-mono);
        }

        /* Nav Tree */
        .nav-section {
            padding: 16px 12px 8px;
        }

        .nav-section-label {
            font-family: var(--font-mono);
            font-size: 0.65em;
            color: var(--wiki-text-dim);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            padding: 0 4px;
            margin-bottom: 8px;
        }

        .nav-tree { list-style: none; }

        .nav-tree li { position: relative; }

        .nav-tree a {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 8px;
            border-radius: 5px;
            color: var(--wiki-text-muted);
            text-decoration: none;
            font-size: 0.85em;
            transition: all 0.15s;
            line-height: 1.4;
        }

        .nav-tree a::before {
            content: '';
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--wiki-border);
            flex-shrink: 0;
            transition: background 0.2s;
        }

        .nav-tree a:hover {
            color: var(--wiki-text);
            background: var(--wiki-border-light);
        }

        .nav-tree a:hover::before,
        .nav-tree a.active::before { background: var(--wiki-accent); }

        .nav-tree a.active {
            color: var(--wiki-accent);
            background: var(--wiki-accent-glow);
            font-weight: 600;
        }

        .nav-sub {
            list-style: none;
            padding-left: 18px;
            border-left: 1px solid var(--wiki-border-light);
            margin-left: 10px;
            margin-top: 2px;
            margin-bottom: 4px;
        }

        .nav-sub a { font-size: 0.78em; padding: 4px 8px; }
        .nav-sub a::before { width: 4px; height: 4px; }

        .sidebar-footer {
            margin-top: auto;
            padding: 14px 16px;
            border-top: 1px solid var(--wiki-border);
        }

        .version-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--wiki-bg);
            border: 1px solid var(--wiki-border);
            border-radius: 20px;
            padding: 4px 10px;
            font-family: var(--font-mono);
            font-size: 0.68em;
            color: var(--wiki-text-dim);
        }

        .version-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--wiki-green); animation: pulse-dot 2s infinite; }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ════════════════ MAIN CONTENT ════════════════ */
        .main-wrapper {
            margin-left: var(--sidebar-width);
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* Top bar */
        .topbar {
            height: 48px;
            background: var(--wiki-surface);
            border-bottom: 1px solid var(--wiki-border);
            display: flex;
            align-items: center;
            padding: 0 40px;
            gap: 8px;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: var(--font-mono);
            font-size: 0.75em;
            color: var(--wiki-text-dim);
        }

        .breadcrumb span { color: var(--wiki-text-muted); }
        .breadcrumb .sep { color: var(--wiki-border); }
        .breadcrumb .current { color: var(--wiki-text); }

        .topbar-actions {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-ghost {
            background: none;
            border: 1px solid var(--wiki-border);
            color: var(--wiki-text-muted);
            border-radius: 6px;
            padding: 5px 12px;
            font-size: 0.75em;
            font-family: var(--font-mono);
            cursor: pointer;
            transition: all 0.15s;
        }
        .btn-ghost:hover { border-color: var(--wiki-accent); color: var(--wiki-accent); }

        /* Article body */
        .article {
            max-width: 820px;
            padding: 40px 40px 80px;
            width: 100%;
        }

        /* Article header */
        .article-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.72em;
            font-family: var(--font-mono);
            font-weight: 600;
            letter-spacing: 0.04em;
        }

        .tag-analysis { background: rgba(188,140,255,0.1); color: var(--wiki-purple); border: 1px solid rgba(188,140,255,0.3); }
        .tag-warning { background: rgba(248,81,73,0.1); color: var(--wiki-red); border: 1px solid rgba(248,81,73,0.3); }
        .tag-social { background: rgba(88,166,255,0.1); color: var(--wiki-accent); border: 1px solid rgba(88,166,255,0.3); }

        .article-date {
            font-family: var(--font-mono);
            font-size: 0.7em;
            color: var(--wiki-text-dim);
            margin-left: auto;
        }

        h1.article-title {
            font-family: var(--font-serif);
            font-size: 2em;
            font-weight: 900;
            color: var(--wiki-text);
            line-height: 1.25;
            margin-bottom: 14px;
            letter-spacing: -0.01em;
        }

        .article-title .title-icon { font-size: 0.8em; opacity: 0.7; }

        .article-desc {
            color: var(--wiki-text-muted);
            font-size: 1em;
            line-height: 1.7;
            border-left: 3px solid var(--wiki-accent);
            padding-left: 16px;
            margin-bottom: 30px;
        }

        .divider {
            height: 1px;
            background: var(--wiki-border);
            margin: 28px 0;
        }

        /* Section headings */
        h2.wiki-h2 {
            font-family: var(--font-sans);
            font-size: 1.25em;
            font-weight: 700;
            color: var(--wiki-text);
            margin-top: 48px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--wiki-border);
        }

        h2.wiki-h2::before {
            content: '#';
            font-family: var(--font-mono);
            font-size: 0.85em;
            color: var(--wiki-accent);
            opacity: 0.7;
        }

        h3.wiki-h3 {
            font-family: var(--font-sans);
            font-size: 1.05em;
            font-weight: 700;
            color: var(--wiki-text);
            margin-top: 32px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        h3.wiki-h3::before {
            content: '##';
            font-family: var(--font-mono);
            font-size: 0.78em;
            color: var(--wiki-purple);
            opacity: 0.7;
        }

        /* Paragraphs */
        .article p {
            color: var(--wiki-text-muted);
            margin-bottom: 14px;
            font-size: 0.95em;
        }

        .article strong { color: var(--wiki-text); font-weight: 700; }

        /* Table */
        .wiki-table-wrap {
            overflow-x: auto;
            margin: 24px 0;
            border-radius: 8px;
            border: 1px solid var(--wiki-border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85em;
        }

        thead tr {
            background: var(--wiki-surface-2);
            border-bottom: 1px solid var(--wiki-border);
        }

        th {
            padding: 12px 16px;
            text-align: left;
            font-family: var(--font-mono);
            font-size: 0.78em;
            color: var(--wiki-text-dim);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            white-space: nowrap;
        }

        td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--wiki-border-light);
            color: var(--wiki-text-muted);
            vertical-align: top;
        }

        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(255,255,255,0.02); }

        /* Code / math */
        .code-pill {
            font-family: var(--font-mono);
            font-size: 0.8em;
            background: rgba(88,166,255,0.08);
            color: var(--wiki-cyan);
            border: 1px solid rgba(88,166,255,0.2);
            padding: 2px 7px;
            border-radius: 4px;
        }

        /* Callout boxes */
        .callout {
            border-radius: 8px;
            padding: 16px 20px;
            margin: 20px 0;
            display: flex;
            gap: 14px;
            font-size: 0.9em;
        }

        .callout-icon { font-size: 1.1em; flex-shrink: 0; margin-top: 2px; }

        .callout-content { flex: 1; }
        .callout-content p { margin: 0; }
        .callout-content strong { display: block; margin-bottom: 4px; font-size: 0.85em; text-transform: uppercase; letter-spacing: 0.06em; }

        .callout-warning {
            background: rgba(248,81,73,0.08);
            border: 1px solid rgba(248,81,73,0.25);
            color: #f0a09e;
        }
        .callout-warning strong { color: var(--wiki-red); }

        .callout-info {
            background: rgba(88,166,255,0.07);
            border: 1px solid rgba(88,166,255,0.2);
            color: #a8ccf0;
        }
        .callout-info strong { color: var(--wiki-accent); }

        .callout-logic {
            background: rgba(188,140,255,0.07);
            border: 1px solid rgba(188,140,255,0.2);
            color: #cdb0f5;
        }
        .callout-logic strong { color: var(--wiki-purple); }

        /* Level cards */
        .level-card {
            border: 1px solid var(--wiki-border);
            border-radius: 10px;
            overflow: hidden;
            margin: 24px 0;
        }

        .level-card-header {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 20px;
            background: var(--wiki-surface-2);
            border-bottom: 1px solid var(--wiki-border);
        }

        .level-num {
            width: 36px; height: 36px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-mono);
            font-weight: 600;
            font-size: 0.85em;
            flex-shrink: 0;
        }

        .level-num.l1 { background: rgba(248,81,73,0.15); color: var(--wiki-red); border: 1px solid rgba(248,81,73,0.3); }
        .level-num.l2 { background: rgba(210,153,34,0.15); color: var(--wiki-amber); border: 1px solid rgba(210,153,34,0.3); }
        .level-num.l3 { background: rgba(188,140,255,0.15); color: var(--wiki-purple); border: 1px solid rgba(188,140,255,0.3); }
        .level-num.l4 { background: rgba(88,166,255,0.15); color: var(--wiki-accent); border: 1px solid rgba(88,166,255,0.3); }
        .level-num.l5 { background: rgba(63,185,80,0.15); color: var(--wiki-green); border: 1px solid rgba(63,185,80,0.3); }

        .level-card-title { flex: 1; }
        .level-card-title h4 { font-size: 0.95em; font-weight: 700; color: var(--wiki-text); margin-bottom: 2px; }
        .level-card-title span { font-family: var(--font-mono); font-size: 0.72em; color: var(--wiki-text-dim); }

        .level-card-body {
            padding: 16px 20px;
            background: var(--wiki-surface);
        }

        .level-card-body p { margin-bottom: 12px; font-size: 0.88em; }
        .level-card-body ul { padding-left: 16px; color: var(--wiki-text-muted); font-size: 0.88em; }
        .level-card-body li { margin-bottom: 8px; line-height: 1.6; }
        .level-card-body li::marker { color: var(--wiki-text-dim); }

        .logic-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin: 12px 0;
        }

        .logic-item {
            background: var(--wiki-bg);
            border: 1px solid var(--wiki-border-light);
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 0.82em;
        }

        .logic-item .condition {
            font-family: var(--font-mono);
            color: var(--wiki-green);
            font-size: 0.85em;
            margin-bottom: 4px;
        }

        .logic-item .outcome { color: var(--wiki-text-muted); }

        /* Blockquote */
        .wiki-quote {
            margin: 28px 0;
            padding: 20px 24px;
            background: var(--wiki-surface-2);
            border: 1px solid var(--wiki-border);
            border-left: 3px solid var(--wiki-purple);
            border-radius: 0 8px 8px 0;
            font-family: var(--font-serif);
            font-size: 1em;
            color: var(--wiki-text-muted);
            font-style: italic;
            line-height: 1.8;
        }

        /* Inline list */
        .article ul {
            padding-left: 0;
            list-style: none;
            margin-bottom: 14px;
        }
        .article > ul li, .article > p + ul li {
            position: relative;
            padding-left: 18px;
            margin-bottom: 8px;
            font-size: 0.93em;
            color: var(--wiki-text-muted);
        }
        .article > ul li::before {
            content: '›';
            position: absolute; left: 0;
            color: var(--wiki-accent);
            font-weight: bold;
        }

        /* ════ RIGHT TOC (outline) ════ */
        .page-toc {
            width: 200px;
            flex-shrink: 0;
            position: sticky;
            top: 48px;
            height: calc(100vh - 48px);
            overflow-y: auto;
            padding: 32px 0 32px 20px;
            border-left: 1px solid var(--wiki-border);
            display: flex;
            flex-direction: column;
        }

        .page-toc-label {
            font-family: var(--font-mono);
            font-size: 0.65em;
            color: var(--wiki-text-dim);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            margin-bottom: 12px;
        }

        .toc-tree { list-style: none; }

        .toc-tree li { margin-bottom: 6px; }

        .toc-tree a {
            font-size: 0.78em;
            color: var(--wiki-text-dim);
            text-decoration: none;
            display: block;
            padding: 3px 0 3px 10px;
            border-left: 2px solid transparent;
            transition: all 0.15s;
            line-height: 1.4;
        }

        .toc-tree a:hover { color: var(--wiki-text-muted); border-color: var(--wiki-border); }
        .toc-tree a.active { color: var(--wiki-accent); border-color: var(--wiki-accent); }

        .toc-sub { padding-left: 10px; list-style: none; }
        .toc-sub a { font-size: 0.72em; }

        /* Content + TOC layout */
        .content-layout {
            display: flex;
            flex: 1;
        }

        /* ════════ RESPONSIVE ════════ */
        @media (max-width: 1100px) { .page-toc { display: none; } }
        @media (max-width: 768px) {
            .sidebar { width: 100%; height: auto; position: relative; }
            .main-wrapper { margin-left: 0; }
            .topbar { padding: 0 16px; }
            .article { padding: 24px 16px 60px; }
        }
    </style>
</head>
<body>

<!-- ══════════ SIDEBAR ══════════ -->
<nav class="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-logo">
